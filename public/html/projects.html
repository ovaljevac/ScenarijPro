<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/projects.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="../js/PoziviAjaxFetch.js"></script>
    <script src="../js/ui-modal.js"></script>
    <script src="../js/projects.js"></script>

    <title>ScenarijPro</title>
</head>
<body>
    <div class="container">
    <div class="nav-container">
        <h2 class="title">ScenarijPro</h2>
        <a href="projects.html" class="active"><i class="fa-regular fa-folder"></i>Projekti</a>
        <a href="writing.html"><i class="fa-solid fa-pen-nib"></i>Pisanje</a>
        <a href="user.html"><i class="fa-solid fa-gear"></i>Postavke</a>
        <hr />
        <div class="user-card">
            <div class="avatar">U</div>
            <div class="user-info">
                <p class="name" id="navUserName">Gost</p>
                <p class="role" id="navUserRole">Niste prijavljeni</p>
            </div>
        </div>
        <div class="auth-actions">
            <a id="loginBtn" class="secondary-btn" href="login.html">Prijava</a>
            <a id="registerBtn" class="secondary-btn" href="login.html?mode=register">Registracija</a>
            <button id="logoutBtn" class="secondary-btn logout-btn" type="button" hidden>Odjavi se</button>
        </div>
    </div>
    <div class="main-menu">
        <div class="header">
            <h1 class="header-title">Svi scenariji</h1>
            <div class="actions">
                <input id="projectSearch" class="search-input" type="text" placeholder="Pretraga">
                <button id="createProjectBtn" class="primary-btn" type="button">+ Novi projekat</button>
            </div>
        </div>
        
        <div id="projectsStatus" class="projects-status">Ucitavanje projekata...</div>
        <div id="projectsGrid" class="cards-grid">
            <button id="createProjectCard" class="card add-card" type="button">
                <div class="add-inner">
                   <i class="fa-regular fa-pen-to-square add-icon"></i>

                        <div>Kreiraj novi scenarij</div>
                    </div>
            </button>
        </div>
    </div>
</body>
</html>
